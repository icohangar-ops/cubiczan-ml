[package]
name = "critmin-oracle"
version.workspace = true
edition.workspace = true
authors.workspace = true
license.workspace = true
description = "AI-powered critical minerals supply chain risk oracle — Rust port"
readme = "README.md"

[dependencies]
# Workspace ML crates
cubiczan-ml-nlp = { path = "../cubiczan-ml-nlp" }

# Serialization
serde = { workspace = true }
