# Crypto (keccak256 for on-chain compatibility)
sha3 = { workspace = true }
hex = { workspace = true }

# Utilities
chrono = { workspace = true }
anyhow = { workspace = true }
thiserror = { workspace = true }
tracing = { workspace = true }

# Async
futures = { workspace = true }

[lib]
name = "critmin_oracle_lib"
path = "src/lib.rs"

[[bin]]
name = "critmin-oracle"
path = "src/main.rs"

[features]
live = []
