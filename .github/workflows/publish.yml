name: Build & Publish to PyPI

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      publish:
        description: "Publish to PyPI?"
        required: false
        default: "true"
        type: choice
        options:
          - "true"
          - "false"

permissions:
  id-token: write  # Required for trusted publishing

jobs:
  build-and-publish:
    name: Build wheel + publish
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12", "3.13"]
        target: [x86_64]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-gnu

      - name: Install maturin
        run: pip install maturin

      - name: Build wheel
        run: maturin build --release --target x86_64-unknown-linux-gnu --find-interpreter
        env:
          MATURIN_PEP517_BACKEND_PATH: crates/cubiczan-ml-py

      - name: Upload wheel artifact
        uses: actions/upload-artifact@v4
        with:
          name: wheel-${{ matrix.python-version }}-linux
          path: target/wheels/*.whl

  publish-pypi:
    name: Publish to PyPI
    needs: build-and-publish
    runs-on: ubuntu-latest
    if: github.event_name == 'release' || github.event.inputs.publish == 'true'
    environment: pypi

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Install maturin
        run: pip install maturin

      - name: Download all wheel artifacts
        uses: actions/download-artifact@v4
        with:
          path: target/wheels/
          pattern: wheel-*
          merge-multiple: true

      - name: Publish to PyPI
        run: maturin upload --repository pypi target/wheels/*.whl
        env:
          MATURIN_PYPI_TOKEN: ${{ secrets.PYPI_API_TOKEN }}

  publish-testpypi:
    name: Publish to TestPyPI
    needs: build-and-publish
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.publish == 'false'

    steps:
      - name: Download all wheel artifacts
        uses: actions/download-artifact@v4
        with:
          path: target/wheels/
          pattern: wheel-*
          merge-multiple: true

      - name: Install maturin
        run: pip install maturin

      - name: Publish to TestPyPI
        run: maturin upload --repository testpypi target/wheels/*.whl
        env:
          MATURIN_PYPI_TOKEN: ${{ secrets.TEST_PYPI_API_TOKEN }}
